spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${KANGDORA_DB_URL}
    username: ${KANGDORA_DB_USERNAME}
    password: ${KANGDORA_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false